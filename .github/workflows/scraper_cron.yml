name: Football Results Grabber

on:
  schedule:
    # Gira ogni 10 minuti (puoi scendere a 5 se vuoi)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permette di avviarlo a mano per test

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python run_scraper_task.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Grabber Bot"
          git config --global user.email "bot@grabber.com"
          git add data/results.db
          git commit -m "Update results: $(date)" || echo "No changes to commit"
          git push